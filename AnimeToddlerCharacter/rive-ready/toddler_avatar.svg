<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8eef8"/>
      <stop offset="1" stop-color="#f8d6df"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#ffe9dc"/>
      <stop offset="1" stop-color="#f7c9b8"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d29b"/>
      <stop offset="1" stop-color="#c88e58"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8dd72"/>
      <stop offset="1" stop-color="#e8c34b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- shadow -->
  <ellipse cx="256" cy="430" rx="110" ry="26" fill="#c8a8b1" opacity="0.28"/>

  <g filter="url(#shadow)">
    <!-- legs -->
    <ellipse cx="210" cy="395" rx="34" ry="52" fill="#fff5f0" transform="rotate(16 210 395)"/>
    <ellipse cx="302" cy="395" rx="34" ry="52" fill="#fff5f0" transform="rotate(-16 302 395)"/>
    <ellipse cx="186" cy="448" rx="28" ry="18" fill="#ffd7b7"/>
    <ellipse cx="326" cy="448" rx="28" ry="18" fill="#ffd7b7"/>

    <!-- body -->
    <path d="M182 242
             Q256 215 330 242
             L352 338
             Q256 385 160 338 Z"
          fill="url(#dress)"/>
    <path d="M182 242
             Q256 215 330 242"
          fill="none" stroke="#e9ca68" stroke-width="6"/>
    <rect x="224" y="214" width="64" height="42" rx="20" fill="#ffe0d0"/>

    <!-- arms -->
    <rect x="144" y="255" width="34" height="116" rx="17" fill="#ffd6c5" transform="rotate(8 161 313)"/>
    <rect x="334" y="255" width="34" height="116" rx="17" fill="#ffd6c5" transform="rotate(-12 351 313)"/>
    <circle cx="168" cy="373" r="18" fill="#ffd6c5"/>
    <circle cx="348" cy="366" r="18" fill="#ffd6c5"/>

    <!-- bow -->
    <ellipse cx="232" cy="257" rx="24" ry="16" fill="#ffffff" transform="rotate(-20 232 257)"/>
    <ellipse cx="280" cy="257" rx="24" ry="16" fill="#ffffff" transform="rotate(20 280 257)"/>
    <circle cx="256" cy="258" r="11" fill="#efe7e8"/>
    <path d="M250 265 L242 286 L256 279 L270 286 L262 265" fill="#ffffff"/>

    <!-- head -->
    <ellipse cx="256" cy="145" rx="108" ry="116" fill="url(#face)"/>

    <!-- ears -->
    <ellipse cx="158" cy="173" rx="19" ry="28" fill="#f2b5a5"/>
    <ellipse cx="354" cy="173" rx="19" ry="28" fill="#f2b5a5"/>

    <!-- hair buns -->
    <g fill="url(#hair)">
      <circle cx="176" cy="70" r="34"/>
      <circle cx="336" cy="70" r="34"/>
      <path d="M148 120
               Q150 40 256 34
               Q362 40 364 120
               Q338 72 318 60
               Q286 42 256 42
               Q226 42 194 60
               Q174 72 148 120 Z"/>
      <path d="M204 86 Q236 34 272 46 Q245 57 220 90 Z"/>
    </g>

    <!-- hair ties -->
    <circle cx="200" cy="86" r="8" fill="#eab1c6"/>
    <circle cx="312" cy="86" r="8" fill="#eab1c6"/>

    <!-- bangs -->
    <path d="M197 92
             Q210 60 236 54
             Q228 72 230 100
             Q214 88 197 92 Z"
          fill="#f3d29b"/>
    <path d="M225 94
             Q244 55 276 52
             Q264 72 266 106
             Q246 90 225 94 Z"
          fill="#efc98e"/>
    <path d="M260 96
             Q284 60 314 58
             Q300 78 298 108
             Q280 92 260 96 Z"
          fill="#e9bf83"/>

    <!-- eyebrows -->
    <path d="M194 141 Q220 132 238 138" stroke="#8e5b3c" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M274 138 Q292 132 318 141" stroke="#8e5b3c" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- eyes -->
    <g>
      <ellipse cx="214" cy="178" rx="28" ry="34" fill="#ffffff"/>
      <ellipse cx="298" cy="178" rx="28" ry="34" fill="#ffffff"/>
      <circle cx="214" cy="181" r="18" fill="#49a4f8"/>
      <circle cx="298" cy="181" r="18" fill="#49a4f8"/>
      <circle cx="214" cy="184" r="10" fill="#132746"/>
      <circle cx="298" cy="184" r="10" fill="#132746"/>
      <circle cx="208" cy="173" r="5" fill="#ffffff"/>
      <circle cx="292" cy="173" r="5" fill="#ffffff"/>
    </g>

    <!-- cheeks -->
    <ellipse cx="180" cy="216" rx="20" ry="12" fill="#f4a4a1" opacity="0.45"/>
    <ellipse cx="332" cy="216" rx="20" ry="12" fill="#f4a4a1" opacity="0.45"/>

    <!-- nose and mouth -->
    <path d="M253 194 Q256 205 250 210" stroke="#e8a896" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M233 229 Q256 246 279 229 Q274 255 256 257 Q238 255 233 229 Z" fill="#f59892"/>
    <path d="M242 233 Q256 241 270 233" stroke="#c76d6d" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
